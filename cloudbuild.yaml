# Google Cloud Build configuration for deploying to Cloud Run
# Documentation: https://cloud.google.com/build/docs/configuring-builds/create-basic-configuration
#
# Prerequisites:
# 1. Enable Cloud Build, Cloud Run, Artifact Registry, and Secret Manager APIs
# 2. Grant Cloud Build service account the required IAM roles:
#    - Cloud Run Admin
#    - Service Account User
#    - Secret Manager Secret Accessor
# 3. Create secrets in Secret Manager for sensitive environment variables
#
# Usage:
#   Manual deploy: gcloud builds submit --config cloudbuild.yaml
#   With substitutions: gcloud builds submit --config cloudbuild.yaml --substitutions=_REGION=us-central1

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: bugrit
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${PROJECT_ID}/bugrit

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:latest'
      - '--cache-from'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}'
    waitFor:
      - 'build'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '3000'
      - '--set-env-vars'
      - 'NODE_ENV=production,PUPPETEER_SKIP_DOWNLOAD=true,PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium'
      - '--set-secrets'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=FIREBASE_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest,ADMIN_ENCRYPTION_KEY=ADMIN_ENCRYPTION_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest'
      - '--update-env-vars'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${PROJECT_ID}.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=${PROJECT_ID},NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${PROJECT_ID}.appspot.com,FIREBASE_PROJECT_ID=${PROJECT_ID},GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
    waitFor:
      - 'push'

images:
  - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:latest'

timeout: '1800s'
