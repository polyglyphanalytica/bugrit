<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bg)"/>
  <!-- Bug body - oval -->
  <ellipse cx="16" cy="18" rx="7" ry="8" fill="white"/>
  <!-- Bug head -->
  <circle cx="16" cy="9" r="4" fill="white"/>
  <!-- Bug shell line (center) -->
  <line x1="16" y1="11" x2="16" y2="25" stroke="url(#bg)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bug shell lines (horizontal segments) -->
  <line x1="10" y1="15" x2="22" y2="15" stroke="url(#bg)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9.5" y1="19" x2="22.5" y2="19" stroke="url(#bg)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10.5" y1="23" x2="21.5" y2="23" stroke="url(#bg)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bug antennae -->
  <line x1="14" y1="6" x2="11" y2="2" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="6" x2="21" y2="2" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="10.5" cy="1.5" r="1.5" fill="white"/>
  <circle cx="21.5" cy="1.5" r="1.5" fill="white"/>
  <!-- Bug eyes -->
  <circle cx="14" cy="8.5" r="1.2" fill="url(#bg)"/>
  <circle cx="18" cy="8.5" r="1.2" fill="url(#bg)"/>
  <!-- Bug legs -->
  <line x1="9" y1="14" x2="5" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="18" x2="4" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="22" x2="5" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="14" x2="27" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="18" x2="28" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="22" x2="27" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
