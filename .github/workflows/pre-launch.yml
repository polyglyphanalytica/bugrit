name: Pre-Launch Validation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  pull_request:
    branches: [main, master]
    types: [opened, synchronize]

jobs:
  validate:
    name: Validate Launch Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pre-launch validation
        id: validate
        run: |
          npx ts-node scripts/pre-launch-validation.ts --json > validation-report.json 2>&1 || true
          READY=$(jq -r '.readyToLaunch' validation-report.json)
          echo "ready=$READY" >> $GITHUB_OUTPUT

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
          retention-days: 30

      - name: Type check
        run: npm run typecheck || npm run type-check || npx tsc --noEmit || true

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          # Minimal env vars for build
          NEXT_PUBLIC_APP_URL: https://example.com
          SKIP_ENV_VALIDATION: true

      - name: Summary
        run: |
          echo "## Pre-Launch Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PASSED=$(jq -r '.summary.passed' validation-report.json)
          WARNINGS=$(jq -r '.summary.warnings' validation-report.json)
          FAILED=$(jq -r '.summary.failed' validation-report.json)

          echo "| Check | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Warnings | $WARNINGS |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.validate.outputs.ready }}" = "true" ]; then
            echo "### ✅ Ready to Launch" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Not Ready - Fix Failed Checks" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check result
        if: steps.validate.outputs.ready != 'true'
        run: |
          echo "::error::Pre-launch validation failed. Review the report for details."
          exit 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          # Simple check for common secret patterns
          if grep -rE "(sk_live_|whsec_|-----BEGIN PRIVATE KEY-----)" --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules .; then
            echo "::error::Potential secrets found in code!"
            exit 1
          fi
          echo "No secrets found in code"
