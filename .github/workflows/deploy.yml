# GitHub Actions workflow for deploying to Firebase App Hosting and Google Cloud Run
#
# Setup Requirements:
# 1. Create a Google Cloud service account with these roles:
#    - Cloud Run Admin
#    - Service Account User
#    - Storage Admin
#    - Secret Manager Secret Accessor
#    - Firebase Admin
#    - Artifact Registry Writer
#
# 2. Add these secrets to your GitHub repository (Settings > Secrets > Actions):
#    - GCP_PROJECT_ID: Your Google Cloud project ID
#    - GCP_SA_KEY: Service account JSON key (base64 encoded)
#    - FIREBASE_SERVICE_ACCOUNT: Firebase service account JSON key
#
# 3. Enable required GCP APIs:
#    - Cloud Build API
#    - Cloud Run API
#    - Artifact Registry API
#    - Secret Manager API
#    - Firebase Hosting API

name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: bugrit
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bugrit

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run typecheck

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

  build-and-deploy-cloud-run:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.environment == 'production'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories describe bugrit \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create bugrit \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Bugrit Docker images" \
            --project=${{ env.PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:latest \
            .
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --port=3000
          env_vars: |
            NODE_ENV=production
            PUPPETEER_SKIP_DOWNLOAD=true
            PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ env.PROJECT_ID }}.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ env.PROJECT_ID }}.appspot.com
            FIREBASE_PROJECT_ID=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
          secrets: |
            NEXT_PUBLIC_FIREBASE_API_KEY=FIREBASE_API_KEY:latest
            FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest
            ADMIN_ENCRYPTION_KEY=ADMIN_ENCRYPTION_KEY:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest

      - name: Show deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

  deploy-firebase-hosting:
    name: Deploy Firebase Hosting
    needs: build-and-deploy-cloud-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}

  deploy-firebase-app-hosting:
    name: Deploy Firebase App Hosting (Alternative)
    needs: test
    runs-on: ubuntu-latest
    if: false  # Set to true to use Firebase App Hosting instead of Cloud Run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase App Hosting
        run: |
          firebase apphosting:backends:create bugrit \
            --project=${{ env.PROJECT_ID }} \
            --location=${{ env.REGION }} \
            --app=bugrit || true
          firebase deploy --only apphosting \
            --project=${{ env.PROJECT_ID }}
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
