# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # Memory allocation (Chromium needs more memory)
  memoryMiB: 1024
  cpu: 1

# Environment variables
env:
  # Build configuration - increase Node.js memory for Next.js build
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=4096"
    availability:
      - BUILD

  # Puppeteer configuration
  - variable: PUPPETEER_SKIP_DOWNLOAD
    value: "true"
  - variable: PUPPETEER_EXECUTABLE_PATH
    value: "/usr/bin/chromium"

  # ============================================================
  # Firebase Client SDK (NEXT_PUBLIC_* = available in browser)
  # Get these from: Firebase Console > Project Settings > General
  # ============================================================
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: bugrit-prod.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: bugrit-prod
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: bugrit-prod.appspot.com
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: FIREBASE_MESSAGING_SENDER_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: FIREBASE_APP_ID

  # ============================================================
  # Firebase Admin SDK (server-side only)
  # ============================================================
  - variable: FIREBASE_PROJECT_ID
    value: bugrit-prod
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY

  # ============================================================
  # Application Configuration
  # ============================================================
  - variable: NEXT_PUBLIC_APP_URL
    value: https://bugrit-prod.web.app
  - variable: ADMIN_ENCRYPTION_KEY
    secret: admin-encryption-key
  - variable: PLATFORM_SUPERADMIN_EMAIL
    secret: platform-superadmin-email

  # ============================================================
  # Stripe Billing (if using payments)
  # ============================================================
  - variable: STRIPE_SECRET_KEY
    secret: stripe-secret-key
  - variable: STRIPE_WEBHOOK_SECRET
    secret: stripe-webhook-secret
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: STRIPE_PUBLISHABLE_KEY

  # ============================================================
  # Google Cloud (for Docker-based scanning tools)
  # ============================================================
  - variable: GOOGLE_CLOUD_PROJECT
    value: bugrit-prod
  - variable: SCAN_OUTPUT_BUCKET
    value: bugrit-prod-bugrit-scans
  - variable: GCP_PROJECT_ID
    value: bugrit-prod

  # ============================================================
  # GitHub OAuth Integration
  # ============================================================
  - variable: GITHUB_CLIENT_ID
    secret: github-client-id
  - variable: GITHUB_CLIENT_SECRET
    secret: github-client-secret
  - variable: GITHUB_REDIRECT_URI
    value: "https://your-domain.web.app/api/auth/github/callback"

  # ============================================================
  # Email Notifications (Resend)
  # ============================================================
  - variable: RESEND_API_KEY
    secret: resend-api-key
  - variable: EMAIL_FROM_ADDRESS
    value: "noreply@bugrit.app"

  # ============================================================
  # GCP Billing Cloud Function (optional - mock data used if not set)
  # ============================================================
  # - variable: GCP_BILLING_FUNCTION_URL
  #   secret: GCP_BILLING_FUNCTION_URL
  # - variable: GCP_BILLING_API_KEY
  #   secret: GCP_BILLING_API_KEY
